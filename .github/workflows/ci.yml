name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [ 18.x, 20.x ]
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: |
        npm install
        cd backend && npm install && cd ..
    
    - name: Run linter
      run: npm run lint --if-present
      continue-on-error: true
    
    - name: Run tests with coverage
      run: npm test
    
    - name: Check test results
      if: failure()
      run: echo "Tests failed!"
    
    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      if: always()
      with:
        files: ./coverage/coverage-final.json
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  build:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20.x'
        cache: 'npm'
    
    - name: Install dependencies
      run: |
        npm install
        cd backend && npm install && cd ..
    
    - name: Build project
      run: npm run build --if-present
    
    - name: Verify frontend assets
      run: |
        ls -la frontend/public/
        ls -la frontend/src/
    
    - name: Create build artifacts
      run: |
        mkdir -p dist
        cp -r frontend/public dist/
        cp -r backend dist/
        cp package.json dist/

  quality:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20.x'
        cache: 'npm'
    
    - name: Install dependencies
      run: |
        npm install
        cd backend && npm install && cd ..
    
    - name: Run format check
      run: npm run format --if-present
      continue-on-error: true
    
    - name: Code quality checks
      run: npm run lint --if-present
      continue-on-error: true

  docs:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Check documentation
      run: |
        echo "Verificando documentação..."
        test -f README.md && echo "✅ README.md encontrado" || echo "❌ README.md não encontrado"
        test -f PRD.md && echo "✅ PRD.md encontrado" || echo "❌ PRD.md não encontrado"
        test -f INSTRUCTIONS.md && echo "✅ INSTRUCTIONS.md encontrado" || echo "❌ INSTRUCTIONS.md não encontrado"

  success:
    runs-on: ubuntu-latest
    needs: [ test, build, quality, docs ]
    if: always()
    
    steps:
    - name: Check if all jobs passed
      run: |
        if [ "${{ needs.test.result }}" = "failure" ] || [ "${{ needs.build.result }}" = "failure" ]; then
          echo "❌ Pipeline falhou!"
          exit 1
        fi
        echo "✅ Pipeline completado com sucesso!"
